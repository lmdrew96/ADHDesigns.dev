<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <style>
    .edge { stroke: #8E7396; stroke-width: 2; stroke-linecap: round; fill: none; }
    .inner-edge { stroke: #8E7396; stroke-width: 1.5; stroke-linecap: round; fill: none; }
    .main-node { fill: #8E7396; }
    .inner-node { fill: #8E7396; }
    .hub-node { fill: #8E7396; }
  </style>

  <!-- Outer triangle -->
  <line class="edge" x1="32.0" y1="6.0" x2="4.0" y2="54.0"/>
  <line class="edge" x1="4.0" y1="54.0" x2="60.0" y2="54.0"/>
  <line class="edge" x1="60.0" y1="54.0" x2="32.0" y2="6.0"/>

  <!-- Main nodes to inner nodes -->
  <line class="edge" x1="32.0" y1="6.0" x2="24.0" y2="35.0"/>
  <line class="edge" x1="4.0" y1="54.0" x2="24.0" y2="35.0"/>
  <line class="edge" x1="32.0" y1="6.0" x2="40.0" y2="35.0"/>
  <line class="edge" x1="60.0" y1="54.0" x2="40.0" y2="35.0"/>
  <line class="edge" x1="4.0" y1="54.0" x2="32.0" y2="48.0"/>
  <line class="edge" x1="60.0" y1="54.0" x2="32.0" y2="48.0"/>

  <!-- Main nodes to center hub -->
  <line class="edge" x1="32.0" y1="6.0" x2="32.0" y2="40.0"/>
  <line class="edge" x1="4.0" y1="54.0" x2="32.0" y2="40.0"/>
  <line class="edge" x1="60.0" y1="54.0" x2="32.0" y2="40.0"/>

  <!-- Inner nodes to center hub -->
  <line class="inner-edge" x1="24.0" y1="35.0" x2="32.0" y2="40.0"/>
  <line class="inner-edge" x1="40.0" y1="35.0" x2="32.0" y2="40.0"/>
  <line class="inner-edge" x1="32.0" y1="48.0" x2="32.0" y2="40.0"/>

  <!-- Center hub node -->
  <circle class="hub-node" cx="32.0" cy="40.0" r="2.5"/>

  <!-- Inner nodes -->
  <circle class="inner-node" cx="24.0" cy="35.0" r="2"/>
  <circle class="inner-node" cx="40.0" cy="35.0" r="2"/>
  <circle class="inner-node" cx="32.0" cy="48.0" r="2"/>

  <!-- Main nodes -->
  <circle class="main-node" cx="32.0" cy="6.0" r="3.5"/>
  <circle class="main-node" cx="4.0" cy="54.0" r="3.5"/>
  <circle class="main-node" cx="60.0" cy="54.0" r="3.5"/>
</svg>